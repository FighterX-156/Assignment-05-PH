<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker Log-in</title>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Daisy+tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <section id="Login-page" class="h-svh bg-[#F8FAFC] flex flex-col justify-center">
      
      <div class="Login-Page">
        <fieldset
          class="mx-auto fieldset bg-white border-base-300 rounded-box w-xs border p-4"
        >
          <div
            class="logo_text_container p-4 mx-auto flex flex-col items-center gap-3"
          >
            <img
              src="./assets/github-logo.png"
              alt="github-logo"
              width="80px"
            />
            <span class="flex flex-col gap-1"
              ><p class="text-base text-center font-bold">
                GitHub Issues Tracker
              </p>
              <p class="text-sm text-center text-[#64748B]">
                Sign in to manage your issues
              </p></span
            >
          </div>

          <label class="label text-black font-semibold mt-1">Username</label>
          <input id="username" type="text" class="input" placeholder="Enter your username" />
          <p class="text-[#4A00FF]">Default: admin</p>

          <label class="label text-black font-semibold mt-1">Password</label>
          <input
            id="password"
            type="password"
            class="input"
            placeholder="Enter your password"
          />
          <p class="text-[#4A00FF]">Default: admin123</p>

          <button id="sign_btn" class="btn btn-primary bg-[#4A00FF] mt-4">Sign In</button>
          <div class="relative p-4">
            <hr class="text-[#64748B]" />
            <p class="absolute bg-white p-1 text-base font bottom-[1px] mx-28">
              or
            </p>
          </div>
          <div class="space-y-2">
            <p class="text-center text-[#64748B]">Demo Credentials:</p>
            <div class="Credentials bg-[#F8FAFC] p-5">
              <p class="text-center">Username: admin</p>
              <p class="text-center">Password: admin123</p>
            </div>
          </div>
        </fieldset>
      </div>
    </section>
    <script src="./login.js"></script>
  </body>
</html>
